<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="progresso"></div>
    <div id="inicio">
      <h1>Quiz JavaScript</h1>

      <div id="opcoes"></div>
    </div>
    <div id="resultado" hidden></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
