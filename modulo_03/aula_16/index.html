<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pokedex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Pokédex</h1>

    <div class="search-box">
      <input type="text" id="pokemonInput" placeholder="Nome ou Nº do Pokémon">
      <button id="searchBtn">Buscar</button>
    </div>

    <span id="status" class="loader"></span>
    <p id="error"></p>

    <div id="pokemonCard" class="card hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
